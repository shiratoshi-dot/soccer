<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サッカーノート</title>
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:linear-gradient(135deg,#7a1428,#5c0f1e);
  }
  .box{
    background:#fff;
    border-radius:16px;
    padding:36px 30px;
    width:90%;
    max-width:360px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
  }
  .box img, .box svg{width:64px;height:64px;margin-bottom:10px;}
  h1{font-size:1.1rem;color:#7a1428;margin:0 0 4px;}
  p{font-size:0.8rem;color:#7a6f68;margin:0 0 20px;}
  input[type=password]{
    width:100%;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:1rem;
    box-sizing:border-box;
    margin-bottom:12px;
  }
  button{
    width:100%;
    padding:10px 14px;
    border-radius:10px;
    border:none;
    background:#7a1428;
    color:#fff;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
  }
  button:hover{background:#5c0f1e;}
  #error{color:#b21f34;font-size:0.8rem;margin-top:10px;display:none;}
</style>
</head>
<body>
<div class="box">
  <h1>サッカーノート</h1>
  <p>パスワードを入力してください</p>
  <input type="password" id="pw" placeholder="パスワード" autocomplete="off">
  <button id="go">開く</button>
  <div id="error">パスワードが違います</div>
</div>

const ITER = 100000;

function b64ToBytes(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function tryDecrypt(password){
  const enc = new TextEncoder();
  const salt = b64ToBytes(SALT_B64);
  const iv = b64ToBytes(IV_B64);
  const cipherBytes = b64ToBytes(CIPHER_B64);

  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:salt, iterations:ITER, hash:"SHA-256"},
    baseKey,
    {name:"AES-GCM", length:256},
    false,
    ["decrypt"]
  );
  const plainBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv:iv}, key, cipherBytes);
  return new TextDecoder().decode(plainBuf);
}

async function attempt(){
  const pw = document.getElementById("pw").value;
  const errEl = document.getElementById("error");
  errEl.style.display = "none";
  try{
    const html = await tryDecrypt(pw);
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    errEl.style.display = "block";
  }
}

document.getElementById("go").addEventListener("click", attempt);
document.getElementById("pw").addEventListener("keydown", (e) => { if(e.key === "Enter") attempt(); });
</script>
