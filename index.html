// ---- render ----
const nav = document.getElementById("tabNav");
const main = document.getElementById("main");
let activeCat = "all";
let activeTag = null;

function makeTabs(){
  nav.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.textContent = "すべて";
  allBtn.className = "active";
  allBtn.onclick = () => setActiveCat("all", allBtn);
  nav.appendChild(allBtn);
  CATEGORIES.forEach(c => {
    const b = document.createElement("button");
    b.textContent = c.name;
    b.onclick = () => setActiveCat(c.id, b);
    nav.appendChild(b);
  });
}
function setActiveCat(id, btn){
  activeCat = id;
  [...nav.children].forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function setTagFilter(tag){
  activeTag = (activeTag === tag) ? null : tag;
  render();
}
window.setTagFilter = setTagFilter;

function cardMatchesSearch(card, q){
  if(!q) return true;
  const hay = (card.title + " " + card.points.join(" ") + " " + (card.tags||[]).join(" ")).toLowerCase();
  return hay.includes(q.toLowerCase());
}

function render(){
  const q = document.getElementById("searchBox").value.trim();
  main.innerHTML = "";
  const cats = activeCat === "all" ? CATEGORIES : CATEGORIES.filter(c => c.id === activeCat);
  let totalShown = 0;

  cats.forEach(cat => {
    let cards = CARDS.filter(c => c.cat === cat.id);
    if(activeTag) cards = cards.filter(c => (c.tags||[]).includes(activeTag));
    cards = cards.filter(c => cardMatchesSearch(c, q));
    if(cards.length === 0 && (q || activeTag)) return;

    const block = document.createElement("div");
    block.className = "category-block";
    block.innerHTML = `<div class="category-title">${cat.name}</div><div class="category-desc">${cat.desc}</div>`;

    if(cards.length === 0){
      block.innerHTML += `<div class="empty-msg">まだ情報がありません。今後追加していきます。</div>`;
      main.appendChild(block);
      totalShown++;
      return;
    }

    // group by sub if present
    const subs = [...new Set(cards.map(c => c.sub || null))];
    subs.forEach(sub => {
      if(sub){
        const idx = subs.indexOf(sub) + 1;
        block.innerHTML += `<div class="subheading"><span class="num">${idx}</span>${sub.replace(/^[①②③]\s*/,"")}</div>`;
      }
      const grid = document.createElement("div");
      grid.className = "card-grid";
      cards.filter(c => (c.sub||null) === sub).forEach(c => {
        grid.appendChild(makeCard(c));
      });
      block.appendChild(grid);
    });

    main.appendChild(block);
    totalShown++;
  });

  if(totalShown === 0){
    main.innerHTML = `<div class="empty-msg" style="margin-top:40px;">該当する情報が見つかりませんでした。</div>`;
  }
}

function makeCard(c){
  const div = document.createElement("div");
  div.className = "card";
  let sourceHtml = "";
  if(typeof c.source === "string"){
    sourceHtml = `<div class="source">出典: ${c.source}</div>`;
  } else if(c.source){
    sourceHtml = `<div class="source">出典: <a href="${c.source.url}" target="_blank" rel="noopener">${c.source.name}</a></div>`;
  }
  const tagsHtml = (c.tags||[]).map(t => `<span class="tag" onclick="setTagFilter('${t}')">${t}</span>`).join("");
  div.innerHTML = `
    <span class="card-type">${c.type}</span>
    <div class="card-title">${c.title}</div>
    <ul>${c.points.map(p => `<li>${p}</li>`).join("")}</ul>
    ${sourceHtml}
    <div class="tag-row">${tagsHtml}</div>
  `;
  return div;
}

document.getElementById("searchBox").addEventListener("input", render);
makeTabs();
render();
</script>
